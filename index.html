<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemViz</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080c10'/><polygon points='16,2 28,9 28,23 16,30 4,23 4,9' fill='none' stroke='%2300e5ff' stroke-width='1.5'/><circle cx='16' cy='16' r='3' fill='%2300e5ff'/><line x1='16' y1='2' x2='16' y2='13' stroke='%2300e5ff' stroke-width='1' opacity='0.5'/><line x1='28' y1='9' x2='18.6' y2='14.5' stroke='%237b61ff' stroke-width='1' opacity='0.5'/><line x1='28' y1='23' x2='18.6' y2='17.5' stroke='%2339ff7e' stroke-width='1' opacity='0.5'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://3dmol.org/build/3Dmol-min.js"></script>
<style>
:root{--bg:#080c10;--surface:#0d1318;--surface2:#121a22;--border:#1e2d3a;--border2:#243545;--accent:#00e5ff;--accent2:#7b61ff;--accent3:#39ff7e;--text:#c8dde8;--text-dim:#5a7a8a;--text-mute:#2e4555;--danger:#ff4d6a;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px);pointer-events:none;z-index:1000}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:rgba(8,12,16,.97);backdrop-filter:blur(12px);flex-shrink:0;z-index:100;gap:10px}
.logo{display:flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:800;font-size:18px;color:#fff;flex-shrink:0}
.logo span{color:var(--accent)}
.logo svg{width:26px;height:26px}
.header-center{display:flex;gap:3px;border:1px solid var(--border2);border-radius:7px;overflow:hidden}
.page-btn{padding:6px 14px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;background:transparent;border:none;color:var(--text-dim);cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.page-btn.active{background:var(--accent);color:#000;font-weight:700}
.header-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sub-mode-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.mode-btn{padding:5px 11px;font-family:var(--mono);font-size:10px;letter-spacing:.07em;background:transparent;border:none;color:var(--text-dim);cursor:pointer;transition:all .15s;text-transform:uppercase}
.mode-btn.active{background:var(--accent2);color:#fff;font-weight:700}
.lang-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.lang-btn{padding:5px 9px;font-family:var(--mono);font-size:10px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;transition:all .15s;font-weight:700}
.lang-btn.active{background:var(--surface2);color:var(--accent3)}
.history-btn{padding:5px 11px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.history-btn:hover{border-color:var(--accent);color:var(--accent)}
.page{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.page.active{display:flex}
/* MOLECULE */
.search-section{padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-label{font-size:10px;letter-spacing:.14em;color:var(--text-mute);text-transform:uppercase;margin-bottom:7px}
.search-row{display:flex;gap:7px}
.search-wrap{flex:1;position:relative;min-width:0}
.search-prefix{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:13px;pointer-events:none;font-weight:700}
#formula-input{width:100%;padding:10px 10px 10px 28px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:#fff;font-family:var(--mono);font-size:14px;letter-spacing:.04em;outline:none;transition:border-color .2s,box-shadow .2s}
#formula-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.08)}
#formula-input::placeholder{color:var(--text-mute)}
.search-btn{padding:0 16px;background:var(--accent);border:none;border-radius:7px;color:#000;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.search-btn:hover{background:#33ecff;box-shadow:0 0 14px rgba(0,229,255,.3)}
.quick-examples{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center}
.eg-label{font-size:9px;color:var(--text-mute);letter-spacing:.1em;text-transform:uppercase}
.example-chip{padding:3px 8px;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s}
.example-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.04)}
.content{display:grid;grid-template-columns:1fr 274px;flex:1;min-height:0;overflow:hidden}
.viewer-panel{position:relative;border-right:1px solid var(--border);background:var(--surface);overflow:hidden;display:flex;flex-direction:column;}
#viewer-container{position:absolute;inset:0;width:100%;height:100%;}
.viewer-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none}
.placeholder-text{font-size:11px;color:var(--text-mute);letter-spacing:.04em;text-align:center;margin-top:10px;line-height:1.7}
.viewer-controls{position:absolute;bottom:12px;left:12px;display:flex;gap:5px}
.ctrl-btn{width:28px;height:28px;background:rgba(13,19,24,.88);border:1px solid var(--border2);border-radius:5px;color:var(--text-dim);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(6px)}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.style-selector{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:3px}
.style-btn{padding:4px 8px;background:rgba(13,19,24,.88);border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .15s;backdrop-filter:blur(6px)}
.style-btn.active,.style-btn:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(123,97,255,.08)}
.loading-state{position:absolute;inset:0;background:var(--surface);display:none;align-items:center;justify-content:center;flex-direction:column;gap:9px;z-index:10}
.loading-state.active{display:flex}
.loader{width:34px;height:34px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.error-state{position:absolute;inset:0;background:var(--surface);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:10}
.error-state.active{display:flex}
.error-msg{font-size:11px;color:var(--danger);text-align:center;padding:0 28px;line-height:1.6}
/* INFO PANEL - overflow fixed */
.info-panel{background:var(--surface);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;min-width:0;width:274px;flex-shrink:0}
.info-section{padding:14px;border-bottom:1px solid var(--border);min-width:0;overflow:hidden}
.info-section-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);margin-bottom:11px}
.mol-name{font-family:var(--sans);font-size:17px;font-weight:800;color:#fff;margin-bottom:3px;line-height:1.3;word-break:break-word;overflow-wrap:anywhere;white-space:normal;max-width:100%}
.mol-formula-display{font-size:11px;color:var(--accent);word-break:break-all;overflow-wrap:anywhere;max-width:100%}
.mol-formula-display sub{font-size:9px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:7px 9px;min-width:0;overflow:hidden}
.stat-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-mute);margin-bottom:3px}
.stat-value{font-size:13px;color:var(--accent3);font-weight:700;word-break:break-all;overflow-wrap:anywhere}
.stat-unit{font-size:9px;color:var(--text-dim);margin-left:2px;font-weight:400}
.elements-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.element-tag{display:flex;align-items:center;gap:4px;padding:3px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;font-size:10px}
.element-symbol{color:#fff;font-weight:700}
.element-count{color:var(--text-dim);font-size:9px}
.element-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.info-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;padding:28px 14px;text-align:center}
/* REACTION */
/* reaction-section managed above */
.reaction-viewers{display:flex;align-items:center;height:280px;border-bottom:1px solid var(--border)}
.reaction-half{flex:1;height:100%;position:relative;overflow:hidden}
.reaction-half-label{position:absolute;top:7px;left:7px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;z-index:5;padding:2px 6px;border-radius:3px;pointer-events:none}
.reactant-label{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:var(--accent)}
.product-label{background:rgba(57,255,126,.1);border:1px solid rgba(57,255,126,.2);color:var(--accent3)}
.reaction-arrow{width:50px;flex-shrink:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;font-size:18px;color:var(--accent2);border-left:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface2)}
.reaction-arrow-text{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute)}
.reaction-input-area{padding:14px 20px;border-bottom:1px solid var(--border);display:none;flex-shrink:0}
.reaction-input-area.active{display:block}
#reaction-input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:#fff;font-family:var(--mono);font-size:13px;letter-spacing:.04em;outline:none;transition:border-color .2s}
#reaction-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(123,97,255,.08)}
#reaction-input::placeholder{color:var(--text-mute)}
.reaction-hint{font-size:9px;color:var(--text-mute);margin-top:5px}.reaction-hint span{color:var(--accent2)}
.recent-bar{padding:7px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-wrap:wrap;background:rgba(13,19,24,.8);flex-shrink:0}
.recent-label{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-mute);white-space:nowrap}
.recent-chip{padding:2px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--accent);font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .15s}
.recent-chip:hover{border-color:var(--accent);background:rgba(0,229,255,.06)}
.tooltip-container{position:relative}
.history-dropdown{position:fixed;top:52px;right:20px;width:250px;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;box-shadow:0 8px 40px rgba(0,0,0,.7);z-index:200;display:none;overflow:hidden}
.history-dropdown.open{display:block}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--border)}
.history-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.clear-btn{font-size:9px;color:var(--danger);background:none;border:none;cursor:pointer;font-family:var(--mono)}
.history-list{max-height:260px;overflow-y:auto}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.history-item:hover{background:rgba(0,229,255,.04)}
.history-item:last-child{border-bottom:none}
.history-formula{font-size:11px;color:var(--accent)}
.history-name{font-size:9px;color:var(--text-dim);margin-top:1px;word-break:break-all;overflow-wrap:anywhere;max-width:160px}
.history-time{font-size:8px;color:var(--text-mute);white-space:nowrap;margin-left:5px}
.history-empty{padding:18px;text-align:center;font-size:10px;color:var(--text-mute)}
/* PERIODIC TABLE */
#page-periodic{overflow:hidden}
.pt-layout{display:grid;grid-template-columns:1fr 250px;flex:1;min-height:0;overflow:hidden}
.pt-main{overflow:auto;padding:12px 14px;min-width:0}
.pt-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pt-toolbar-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute)}
.color-mode-select{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 7px;outline:none;cursor:pointer}
.pt-legend{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--text-dim)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pt-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;min-width:640px;outline:none}
.pt-cell{aspect-ratio:1;border-radius:3px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid transparent;transition:transform .1s,border-color .1s,box-shadow .1s;padding:1px}
.pt-cell:hover,.pt-cell.focused{transform:scale(1.14);z-index:10;border-color:rgba(255,255,255,.5)!important;box-shadow:0 0 10px rgba(255,255,255,.18)}
.pt-cell.focused{box-shadow:0 0 0 2px var(--accent),0 0 14px rgba(0,229,255,.3)!important;border-color:var(--accent)!important}
.pt-cell.empty{background:transparent!important;border:none!important;cursor:default;pointer-events:none}
.pt-cell .el-num{font-size:5.5px;color:rgba(255,255,255,.5);line-height:1;align-self:flex-start;padding-left:2px}
.pt-cell .el-sym{font-size:12px;font-weight:700;color:#fff;line-height:1;font-family:var(--sans)}
.pt-cell .el-name-sm{font-size:5px;color:rgba(255,255,255,.65);line-height:1;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1px}
.el-info-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;width:250px;flex-shrink:0}
.el-info-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:7px;padding:20px;text-align:center;color:var(--text-mute);font-size:10px;line-height:1.6}
.el-info-content{display:none}
.el-props{padding:0 13px 13px}
.el-prop-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);gap:6px}
.el-prop-row:last-child{border-bottom:none}
.el-prop-key{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);flex-shrink:0}
.el-prop-val{font-size:10px;color:var(--text);text-align:right;word-break:break-word;max-width:150px}
.el-prop-val.accent{color:var(--accent3)}
.el-action-btn{margin:0 13px 13px;padding:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--accent);font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .15s;width:calc(100% - 26px)}
.el-action-btn:hover{background:rgba(0,229,255,.08);border-color:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .25s ease forwards}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--accent3);box-shadow:0 0 5px var(--accent3);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── REACTION STAGE (injected fix) ── */
#reaction-section{
  display:none;
  flex-direction:column;
  background:var(--surface);
  width:100%;height:100%;
  overflow:hidden;
}
#reaction-section.active{display:flex}
.rxn-stage{
  flex:1;min-height:0;overflow-y:scroll;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 40px;gap:0;
  -webkit-overflow-scrolling:touch;
}
.rxn-eq-bar{
  display:flex;align-items:center;justify-content:flex-start;
  flex-wrap:wrap;gap:6px;flex-shrink:0;
  background:transparent;border:none;
  padding:14px 24px 6px;margin-bottom:4px;
  width:100%;max-width:900px;
}
.rxn-eq-term{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.04em;}
.rxn-eq-term sub{font-size:10px;font-weight:700}
.rxn-eq-coeff{color:var(--accent2)}
.rxn-eq-r{color:var(--accent)}
.rxn-eq-p{color:var(--accent3)}
.rxn-eq-plus{color:var(--text-mute);font-size:15px;padding:0 2px}
.rxn-eq-arrow{color:var(--accent2);font-size:17px;padding:0 6px;animation:arrowPulse 1.5s ease-in-out infinite;}
@keyframes arrowPulse{0%,100%{opacity:1;transform:translateX(0)}50%{opacity:.6;transform:translateX(3px)}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none"><polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#00e5ff" stroke-width="1.5"/><circle cx="16" cy="16" r="3" fill="#00e5ff"/><line x1="16" y1="2" x2="16" y2="13" stroke="#00e5ff" stroke-width="1" opacity="0.5"/><line x1="28" y1="9" x2="18.6" y2="14.5" stroke="#7b61ff" stroke-width="1" opacity="0.5"/><line x1="28" y1="23" x2="18.6" y2="17.5" stroke="#39ff7e" stroke-width="1" opacity="0.5"/></svg>
    Chem<span>Viz</span>
  </div>
  <div class="header-center">
    <button class="page-btn active" id="btn-mol" onclick="switchPage('mol')" data-i="tabMol">분자 뷰어</button>
    <button class="page-btn" id="btn-periodic" onclick="switchPage('periodic')" data-i="tabPeriodic">주기율표</button>
  </div>
  <div class="header-right">
    <div class="sub-mode-toggle" id="sub-mode-toggle">
      <button class="mode-btn active" id="mol-mode-btn" onclick="setMode('molecule')" data-i="subMol">분자</button>
      <button class="mode-btn" id="rxn-mode-btn" onclick="setMode('reaction')" data-i="subRxn">반응식</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="lang-ko" onclick="setLang('ko')">KO</button>
    </div>
    <div class="tooltip-container">
      <button class="history-btn" id="history-btn-el" onclick="toggleHistory()">기록 ▾</button>
      <div class="history-dropdown" id="history-dropdown">
        <div class="history-header">
          <span class="history-title" data-i="histTitle">검색 기록</span>
          <button class="clear-btn" onclick="clearHistory()" data-i="clearAll">전체 삭제</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </div>
</header>

<!-- MOLECULE PAGE -->
<div class="page active" id="page-mol">
  <div class="search-section" id="mol-search">
    <div class="search-label" data-i="molInputLabel">// 분자식 입력</div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-prefix">⬡</span>
        <input type="text" id="formula-input" placeholder="예: H2O, C6H12O6, NaCl, Fe2O3" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <button class="search-btn" onclick="searchMolecule()" data-i="analyzeBtn">분석 →</button>
    </div>
    <div class="quick-examples">
      <span class="eg-label" data-i="eg">예시</span>
      <button class="example-chip" onclick="loadExample('H2O')">H₂O</button>
      <button class="example-chip" onclick="loadExample('C6H12O6')">C₆H₁₂O₆</button>
      <button class="example-chip" onclick="loadExample('NaCl')">NaCl</button>
      <button class="example-chip" onclick="loadExample('NH3')">NH₃</button>
      <button class="example-chip" onclick="loadExample('C2H5OH')">C₂H₅OH</button>
      <button class="example-chip" onclick="loadExample('CO2')">CO₂</button>
    </div>
  </div>

let currentPage='mol';

  // Restore state after page switch
  if(p==='mol'){
    setTimeout(function(){
      if(currentMode==='reaction'&&lastRxnState){
        buildEqBar(lastRxnState.reactants,lastRxnState.products);
        buildMolGrid(lastRxnState.reactants,lastRxnState.products);
        renderRxnInfoPanel(lastRxnState.reactants,lastRxnState.products,lastRxnState.sdfs);
      } else if(currentMode==='molecule'&&lastProps){
        showMolInfo(lastProps,lastRaw);

          if(viewer&&!document.getElementById('viewer-container').dataset.skeletal){

let viewer=null,viewerR=null,viewerP=null;
let currentStyle='stick',isSpinning=false,currentMode='molecule';
let history=JSON.parse(localStorage.getItem('chemviz_history')||'[]');

let lastRxnState=null;
const elementColors={H:'#e0e0e0',C:'#909090',N:'#3050f8',O:'#ff0d0d',F:'#90e050',Cl:'#1ff01f',Br:'#a62929',I:'#940094',S:'#ffff30',P:'#ff8000',Na:'#ab5cf2',K:'#8f40d4',Ca:'#3dff00',Mg:'#8aff00',Fe:'#e06633',Cu:'#c88033',Zn:'#7d80b0',default:'#ff69b4'};

function setMode(mode){
  currentMode=mode;
  document.getElementById('mol-mode-btn').classList.toggle('active',mode==='molecule');
  document.getElementById('rxn-mode-btn').classList.toggle('active',mode==='reaction');
  document.getElementById('mol-search').style.display=mode==='molecule'?'block':'none';
  document.getElementById('rxn-search').classList.toggle('active',mode==='reaction');
  // Explicitly show/hide both panels
  const rxnSec=document.getElementById('reaction-section');
  const viewerCont=document.getElementById('viewer-container');
  const viewerControls=document.getElementById('viewer-controls');
  const styleSel=document.getElementById('style-selector');
  const placeholder=document.getElementById('placeholder');
  if(mode==='molecule'){
    rxnSec.style.display='none';
    rxnSec.classList.remove('active');
    viewerCont.style.display='block';
    if(lastSdf){
      viewerControls.style.display='flex';
      styleSel.style.display='flex';
      placeholder.style.display='none';
      if(viewer&&!viewerCont.dataset.skeletal){
        setTimeout(function(){viewer.resize();viewer.render();},50);
      }
    }
  } else {
    rxnSec.style.display='flex';
    rxnSec.classList.add('active');
    viewerCont.style.display='none';
    viewerControls.style.display='none';
    styleSel.style.display='none';
    placeholder.style.display='none';
  }
  if(mode==='reaction'){
    // Hide molecule-only controls but DON'T wipe info panel
    document.getElementById('viewer-controls').style.display='none';
    document.getElementById('style-selector').style.display='none';

    if(lastRxnState){
      setTimeout(function(){
        buildEqBar(lastRxnState.reactants,lastRxnState.products);
        buildMolGrid(lastRxnState.reactants,lastRxnState.products);
        renderRxnInfoPanel(lastRxnState.reactants,lastRxnState.products,lastRxnState.sdfs);

      // No reaction yet — show placeholder in info panel
      if(!lastProps){
        document.getElementById('info-placeholder').style.display='flex';
        document.getElementById('mol-info').style.display='none';

    if(lastProps){

      document.getElementById('info-placeholder').style.display='flex';

function loadExample(f){document.getElementById('formula-input').value=f;searchMolecule();}
document.getElementById('formula-input').addEventListener('keydown',e=>{if(e.key==='Enter')searchMolecule();});
document.getElementById('reaction-input').addEventListener('keydown',e=>{if(e.key==='Enter')searchReaction();});

async function searchMolecule(formula){
  const raw=(formula||document.getElementById('formula-input').value).trim();
  if(!raw)return;
  showLoading();hideError();hidePlaceholder();
  try{
    const cid=await getCID(raw);
    if(!cid)throw new Error(t('errNotFound'));
    lastCid=cid;
    const[sdfData,props]=await Promise.all([fetch3DSDF(cid),fetchMoleculeProps(cid)]);
    if(!sdfData)throw new Error(t('errNoStruct'));
    renderMolecule(sdfData);showMolInfo(props,raw);
    addToHistory(raw,props.name||raw);updateRecentChips();
  }catch(err){showError(err.message);}
  finally{hideLoading();}
}
async function getCID(formula){
  const opts={mode:'cors'};
  const tries=[
    `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/fastformula/${encodeURIComponent(formula)}/cids/JSON`,
    `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/formula/${encodeURIComponent(formula)}/cids/JSON`,
    `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(formula)}/cids/JSON`,
  ];
  for(const url of tries){
    try{
      const r=await fetch(url,opts);if(!r.ok)continue;
      const d=await r.json();
      const cid=d.IdentifierList?.CID?.[0]||d.CIDList?.CID?.[0];
      if(cid)return cid;
    }catch{}
  }
  return null;
}
async function fetch3DSDF(cid){
  const opts={mode:'cors'};
  try{
    const r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF?record_type=3d`,opts);
    if(r.ok)return await r.text();
    const r2=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF`,opts);
    if(r2.ok)return await r2.text();
  }catch{}
  return null;
}
async function fetchMoleculeProps(cid){
  try{
    const r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/property/MolecularFormula,MolecularWeight,IUPACName/JSON`);
    const d=await r.json();const p=d.PropertyTable?.Properties?.[0]||{};
    const sr=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/synonyms/JSON`);
    const sd=await sr.json();
    const syns=sd.InformationList?.Information?.[0]?.Synonym||[];
    return{formula:p.MolecularFormula,weight:p.MolecularWeight,iupac:p.IUPACName,name:syns[0]||p.IUPACName||'',cid};
  }catch{return{};}
}
function renderMolecule(sdfData,skipStyleReset){
  lastSdf=sdfData;
  const c=document.getElementById('viewer-container');
  c.style.height='100%';c.dataset.skeletal='';
  if(!viewer){
    c.innerHTML='';
    viewer=$3Dmol.createViewer(c,{backgroundColor:'#0d1318',antialias:true});
  } else {
    viewer.removeAllModels();
    viewer.removeAllSurfaces();
    viewer.resize();
  }
  viewer.addModel(sdfData,'sdf');
  if(!skipStyleReset&&currentStyle==='skeletal')currentStyle='stick';
  applyStyle(currentStyle);
  viewer.zoomTo();viewer.render();
  document.getElementById('viewer-controls').style.display='flex';
  document.getElementById('style-selector').style.display='flex';
}
function applyStyle(style){
  if(style==='skeletal'){
    // Show 2D skeletal formula via PubChem image
    showSkeletalView();
    return;
  }
  const container=document.getElementById('viewer-container');
  // Restore 3D viewer if switching away from skeletal
  if(container.dataset.skeletal==='1'){
    container.dataset.skeletal='';
    if(lastSdf)renderMolecule(lastSdf,true);
    return;
  }
  if(!viewer)return;viewer.setStyle({},{});
  if(style==='stick')viewer.setStyle({},{stick:{colorscheme:'Jmol',radius:.15},sphere:{colorscheme:'Jmol',scale:.3}});
  else if(style==='sphere')viewer.setStyle({},{sphere:{colorscheme:'Jmol'}});
  else if(style==='line')viewer.setStyle({},{line:{colorscheme:'Jmol',linewidth:2}});
  viewer.render();
}

let lastSdf=null;
let lastCid=null;

function showSkeletalView(){
  if(!lastCid)return;
  const container=document.getElementById('viewer-container');
  container.dataset.skeletal='1';
  container.innerHTML=`
    <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface);flex-direction:column;gap:12px">

          onerror="this.parentElement.innerHTML='<div style=color:#999;font-size:12px;padding:20px>2D 구조 이미지를 불러올 수 없습니다</div>'"
        >
      </div>
      <div style="font-size:10px;color:var(--text-mute);letter-spacing:.08em">2D SKELETAL FORMULA</div>
    </div>`;
}
function setStyle(style){
  const prev=currentStyle;
  currentStyle=style;
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('active',b.dataset.style===style));
  if(style==='skeletal'){
    applyStyle('skeletal');
  } else {
    const container=document.getElementById('viewer-container');
    if(container.dataset.skeletal==='1'){
      // restore 3d viewer
      container.dataset.skeletal='';
      if(lastSdf)renderMolecule(lastSdf,true);
      // re-apply chosen style after viewer rebuild
      setTimeout(()=>{if(viewer){applyStyle(style);}},50);
    } else {
      applyStyle(style);
    }
  }
}
function resetView(){if(viewer){viewer.zoomTo();viewer.render();}}
function toggleSpin(){
  if(!viewer)return;isSpinning=!isSpinning;
  const btn=document.getElementById('spin-btn');
  if(isSpinning){viewer.spin('y',1);btn.style.color='var(--accent)';}
  else{viewer.spin(false);btn.style.color='';}

function showMolInfo(props,raw){
  lastProps=props;lastRaw=raw;
  const{formula,weight,iupac,name,cid}=props;
  const elements=parseElements(formula||raw);
  const formatted=formatFormula(formula||raw);
  let html=`
    <div class="info-section animate-in">
      <div class="info-section-title">${t('idSection')}</div>
      <div class="mol-name">${capitalize(name||iupac||raw)}</div>
      <div class="mol-formula-display">${formatted}</div>
    </div>
    <div class="info-section animate-in">
      <div class="info-section-title">${t('physSection')}</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">${t('mw')}</div><div class="stat-value">${weight?parseFloat(weight).toFixed(3):'—'}<span class="stat-unit">g/mol</span></div></div>
        <div class="stat-card"><div class="stat-label">${t('elemCount')}</div><div class="stat-value">${Object.keys(elements).length}<span class="stat-unit">${t('molUnit')}</span></div></div>
        <div class="stat-card" style="grid-column:1/-1"><div class="stat-label">${t('atomCount')}</div><div class="stat-value">${Object.values(elements).reduce((a,b)=>a+b,0)}<span class="stat-unit">${t('atomUnit')}</span></div></div>
      </div>
    </div>
    <div class="info-section animate-in">
      <div class="info-section-title">${t('elemSection')}</div>
      <div class="elements-list">${Object.entries(elements).map(([el,cnt])=>`<div class="element-tag"><div class="element-dot" style="background:${getElementColor(el)}"></div><span class="element-symbol">${el}</span><span class="element-count">x${cnt}</span></div>`).join('')}</div>

function parseElements(f){
  if(!f)return{};const r={},re=/([A-Z][a-z]?)(\d*)/g;let m;
  while((m=re.exec(f))!==null)if(m[1])r[m[1]]=(r[m[1]]||0)+(parseInt(m[2])||1);
  return r;
}
function formatFormula(f){return f?f.replace(/(\d+)/g,'<sub>$1</sub>'):''}
function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}

async function searchReaction(){
  const raw=document.getElementById('reaction-input').value.trim();if(!raw)return;
  if(!raw.includes('→')&&!raw.includes('>')){showError(t('errRxnArrow'));return;}
  showLoading();document.getElementById('placeholder').style.display='none';
  try{
    const parsed=parseReaction(raw);
    const rFormulas=parsed.reactants.map(x=>x.formula);
    const pFormulas=parsed.products.map(x=>x.formula);
    const allFormulas=[...rFormulas,...pFormulas];
    const cids=await Promise.all(allFormulas.map(f=>getCID(f)));
    const sdfs=await Promise.all(cids.map((cid,i)=>cid?fetch3DSDF(cid):null));
    const rSdfs=sdfs.slice(0,rFormulas.length);
    const pSdfs=sdfs.slice(rFormulas.length);
    await renderReactionViewers(parsed.reactants,parsed.products,{r:rSdfs,p:pSdfs});
  }catch(err){showError(err.message);}
  finally{hideLoading();}
}

// Draw a single molecule as SVG balls arranged by count
function drawMoleculeSVG(formula, coeff){
  const atoms = parseElements(formula);
  // Build atom list (with repetition by count, max 12 for display)
  const atomList=[];
  Object.entries(atoms).forEach(([sym,cnt])=>{
    for(let i=0;i<Math.min(cnt,8);i++) atomList.push(sym);
  });
  const n=atomList.length;
  if(n===0)return null;

  // Layout: arrange in rows of up to 4
  const cols=Math.min(n,4);
  const rows=Math.ceil(n/cols);
  const maxR=22;
  const pad=6;
  const cellW=(maxR*2+pad);
  const cellH=(maxR*2+pad);
  const W=cols*cellW+pad*2;
  const H=rows*cellH+pad*2;

  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);
  svg.setAttribute('height',H);
  svg.style.maxWidth='100%';
  svg.style.maxHeight='100%';

  // Draw bonds (simple lines between adjacent atoms)
  for(let i=0;i<n-1&&i<8;i++){
    const col1=i%cols, row1=Math.floor(i/cols);
    const col2=(i+1)%cols, row2=Math.floor((i+1)/cols);
    if(row1===row2){
      const x1=pad+col1*cellW+maxR;
      const y1=pad+row1*cellH+maxR;
      const x2=pad+col2*cellW+maxR;
      const line=document.createElementNS(ns,'line');
      line.setAttribute('x1',x1);line.setAttribute('y1',y1);
      line.setAttribute('x2',x2);line.setAttribute('y2',y1);
      line.setAttribute('stroke','rgba(255,255,255,.2)');
      line.setAttribute('stroke-width','3');
      svg.appendChild(line);
    }
  }

  atomList.forEach(function(sym,i){
    const col=i%cols, row=Math.floor(i/cols);
    const cx=pad+col*cellW+maxR;
    const cy=pad+row*cellH+maxR;
    const st=getAtomStyle(sym);

    // Glow
    const glow=document.createElementNS(ns,'circle');
    glow.setAttribute('cx',cx);glow.setAttribute('cy',cy);
    glow.setAttribute('r',st.r+5);
    glow.setAttribute('fill',st.color);
    glow.setAttribute('opacity','0.15');
    svg.appendChild(glow);

    // Main circle with gradient effect (two circles)
    const circle=document.createElementNS(ns,'circle');
    circle.setAttribute('cx',cx);circle.setAttribute('cy',cy);
    circle.setAttribute('r',st.r);
    circle.setAttribute('fill',st.color);
    circle.setAttribute('stroke',st.stroke);
    circle.setAttribute('stroke-width','1.5');
    svg.appendChild(circle);

    // Highlight
    const hi=document.createElementNS(ns,'circle');
    hi.setAttribute('cx',cx-st.r*.25);hi.setAttribute('cy',cy-st.r*.28);
    hi.setAttribute('r',st.r*.35);
    hi.setAttribute('fill','rgba(255,255,255,.25)');
    svg.appendChild(hi);

    // Label
    const text=document.createElementNS(ns,'text');
    text.setAttribute('x',cx);text.setAttribute('y',cy);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('dominant-baseline','central');
    text.setAttribute('font-size',sym.length>1?'9':'11');
    text.setAttribute('font-weight','700');
    text.setAttribute('font-family','Syne, sans-serif');
    text.setAttribute('fill','#fff');
    text.setAttribute('pointer-events','none');
    text.textContent=sym;
    svg.appendChild(text);
  });

  return svg;
}

  card.appendChild(fLabel);

  const atoms=parseElements(mol.formula);

  });

  summary.style.cssText='display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:2px;';

    tag.appendChild(dot);
    tag.appendChild(document.createTextNode(sym+' ×'+total));
    summary.appendChild(tag);
  });
  card.appendChild(summary);
  return card;
}

function parseReaction(raw){
  const hasArrow=raw.includes('\u2192');
  const arrow=hasArrow?'\u2192':'>';
  const idx=raw.indexOf(arrow);
  if(idx<0)return{reactants:[],products:[]};
  const L=raw.slice(0,idx).trim();
  const R=raw.slice(idx+arrow.length).trim();
  function parseSide(side){
    return side.split('+').map(s=>{
      s=s.trim();
      const m=s.match(/^(\d+)(.+)/);
      return m?{coeff:parseInt(m[1]),formula:m[2].trim()}:{coeff:1,formula:s};
    }).filter(x=>x.formula);
  }
  return{reactants:parseSide(L),products:parseSide(R)};
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return t('justNow');
  if(s<3600)return lang==='ko'?`${Math.floor(s/60)}분 전`:`${Math.floor(s/60)}m ago`;
  if(s<86400)return lang==='ko'?`${Math.floor(s/3600)}시간 전`:`${Math.floor(s/3600)}h ago`;
  return lang==='ko'?`${Math.floor(s/86400)}일 전`:`${Math.floor(s/86400)}d ago`;
}

let currentColorMode='category';
let focusedEl=1;

function buildGridMap(){
  const map={};
  // Standard positions for elements with defined groups
  ELEMENTS.forEach(e=>{
    const num=e[0],grp=e[7],period=e[8];
    if(grp!==null){map[num]={col:grp,row:period};}
  });
  // Lanthanides (58-71): row 9, cols 4-17
  for(let n=58;n<=71;n++){map[n]={col:n-58+4,row:9};}
  // Actinides (90-103): row 10, cols 4-17
  for(let n=90;n<=103;n++){map[n]={col:n-90+4,row:10};}
  // La(57) and Ac(89) appear in both standard AND series rows — show in series
  map[57]={col:3,row:9};
  map[89]={col:3,row:10};
  // Lu(71) and Lr(103) have group=3 but belong in series
  map[71]={col:17,row:9};
  map[103]={col:17,row:10};
  return map;
}
const gridMap=buildGridMap();

function getCellColor(el){
  const mode=COLOR_MODES[currentColorMode];
  const key=mode.getKey(el);
  return(mode.palette[key]||{color:'#2c3344'}).color;
}

function renderPeriodicTable(){
  const grid=document.getElementById('pt-grid');
  grid.innerHTML='';
  const cells={};
  ELEMENTS.forEach(e=>{
    const pos=gridMap[e[0]];if(!pos)return;
    if(!cells[pos.row])cells[pos.row]={};
    cells[pos.row][pos.col]=e;
  });
  for(let row=1;row<=7;row++){
    for(let col=1;col<=18;col++){
      const el=cells[row]&&cells[row][col];
      const div=document.createElement('div');
      if(el){
        div.className='pt-cell';div.dataset.num=el[0];
        div.style.background=getCellColor(el);
        div.innerHTML=`<span class="el-num">${el[0]}</span><span class="el-sym">${el[1]}</span><span class="el-name-sm">${lang==='ko'?el[2]:el[3]}</span>`;
        div.addEventListener('mouseenter',()=>showElementInfo(el[0]));
        div.addEventListener('dblclick',()=>searchElementInViewer(el[1]));
        div.addEventListener('click',()=>{focusedEl=el[0];updateFocus();});
      } else {div.className='pt-cell empty';}
      grid.appendChild(div);
    }
  }
  // separator
  for(let col=1;col<=18;col++){const d=document.createElement('div');d.className='pt-cell empty';d.style.cssText='height:5px;aspect-ratio:unset';grid.appendChild(d);}
  // lanthanide + actinide rows
  for(let seriesRow=9;seriesRow<=10;seriesRow++){
    for(let col=1;col<=18;col++){
      const el=cells[seriesRow]&&cells[seriesRow][col];
      const div=document.createElement('div');
      if(el){
        div.className='pt-cell';div.dataset.num=el[0];
        div.style.background=getCellColor(el);
        div.innerHTML=`<span class="el-num">${el[0]}</span><span class="el-sym">${el[1]}</span><span class="el-name-sm">${lang==='ko'?el[2]:el[3]}</span>`;
        div.addEventListener('mouseenter',()=>showElementInfo(el[0]));
        div.addEventListener('dblclick',()=>searchElementInViewer(el[1]));
        div.addEventListener('click',()=>{focusedEl=el[0];updateFocus();});
      } else {
        div.className='pt-cell empty';
        if(col===1){div.style.cssText='display:flex;align-items:center;justify-content:flex-end;padding-right:3px;font-size:7px;color:var(--text-mute);aspect-ratio:1';div.textContent=seriesRow===9?(lang==='ko'?'란':'Ln'):(lang==='ko'?'악':'Ac');}
      }
      grid.appendChild(div);
    }
  }
  updateFocus();
}

function applyColorMode(){
  currentColorMode=document.getElementById('color-mode-select').value;
  document.querySelectorAll('.pt-cell[data-num]').forEach(div=>{
    const el=elByNum[parseInt(div.dataset.num)];
    if(el)div.style.background=getCellColor(el);
  });
  renderLegend();
}

function renderLegend(){
  const mode=COLOR_MODES[currentColorMode];
  document.getElementById('pt-legend').innerHTML=Object.entries(mode.palette).map(([k,v])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${v.color}"></div><span>${lang==='ko'?v.ko:v.en}</span></div>`).join('');
}

  const altName=lang==='ko'?nameEn:nameKo;
  const catLabels={alkali:{ko:'알칼리 금속',en:'Alkali Metal'},alkaline:{ko:'알칼리 토금속',en:'Alkaline Earth'},transition:{ko:'전이 금속',en:'Transition Metal'},post:{ko:'전이 후 금속',en:'Post-Transition'},metalloid:{ko:'반금속',en:'Metalloid'},nonmetal:{ko:'비금속',en:'Nonmetal'},halogen:{ko:'할로겐',en:'Halogen'},noble:{ko:'비활성 기체',en:'Noble Gas'},lanthanide:{ko:'란타넘족',en:'Lanthanide'},actinide:{ko:'악티늄족',en:'Actinide'},unknown:{ko:'미분류',en:'Unknown'}};
  const stateLabels={solid:{ko:'고체',en:'Solid'},liquid:{ko:'액체',en:'Liquid'},gas:{ko:'기체',en:'Gas'},synthetic:{ko:'인공합성',en:'Synthetic'}};
  const catLabel=(catLabels[cat]||{ko:cat,en:cat})[lang];
  const stateLabel=(stateLabels[state]||{ko:state,en:state})[lang];
  const catColor=COLOR_MODES.category.palette[cat]?.color||'#444';
  document.getElementById('el-info-placeholder').style.display='none';
  const content=document.getElementById('el-info-content');
  content.style.display='block';
  content.innerHTML=`
    <div style="background:${catColor}33;border-bottom:2px solid ${catColor}55;padding:18px 14px 10px;text-align:center">
      <div style="font-family:var(--sans);font-size:56px;font-weight:800;color:#fff;line-height:1">${sym}</div>
      <div style="font-family:var(--sans);font-size:15px;font-weight:600;color:${catColor===COLOR_MODES.category.palette.noble?.color?'#aed6f1':'#aef'};margin-top:3px;word-break:break-word">${name}</div>
      <div style="font-size:9px;color:var(--text-dim);margin-top:1px">${altName}</div>
    </div>
    <div class="el-props">
      ${prow(t('elNumber'),n)}
      ${prow(t('elWeight'),mass+' amu','accent')}
      ${prow(t('elCategory'),catLabel)}
      ${prow(t('elState'),stateLabel)}
      ${prow(t('elGroup'),grp||'—')}
      ${prow(t('elPeriod'),period)}
      ${prow(t('elConfig'),config)}
      ${prow(t('elAbundance'),abund>0?abund+'ppm':(lang==='ko'?'자연계 없음':'Not Natural'))}
      ${prow(t('elDiscovery'),disc>0?disc:(lang==='ko'?'고대':'Ancient'))}
      ${prow(t('elRadioactive'),radio?(lang==='ko'?'예 ☢':'Yes ☢'):(lang==='ko'?'아니오':'No'))}
    </div>
    <button class="el-action-btn" onclick="searchElementInViewer('${sym}')">${t('goToViewer')} →</button>`;
}
function prow(k,v,cls=''){return`<div class="el-prop-row"><span class="el-prop-key">${k}</span><span class="el-prop-val ${cls}">${v}</span></div>`;}

function searchElementInViewer(sym){
  switchPage('mol');
  if(currentMode!=='molecule')setMode('molecule');
  document.getElementById('formula-input').value=sym;
  searchMolecule(sym);
}
function updateFocus(){
  document.querySelectorAll('.pt-cell.focused').forEach(d=>d.classList.remove('focused'));
  const cell=document.querySelector(`.pt-cell[data-num="${focusedEl}"]`);
  if(cell)cell.classList.add('focused');
}
document.getElementById('pt-grid').addEventListener('keydown',e=>{
  const el=elByNum[focusedEl];if(!el)return;
  const pos=gridMap[focusedEl];if(!pos)return;
  let tgt=null;
  if(e.key==='ArrowRight'){for(let n=focusedEl+1;n<=118;n++){const p=gridMap[n];if(p&&p.row===pos.row&&p.col>pos.col){tgt=n;break;}}}
  else if(e.key==='ArrowLeft'){for(let n=focusedEl-1;n>=1;n--){const p=gridMap[n];if(p&&p.row===pos.row&&p.col<pos.col){tgt=n;break;}}}
  else if(e.key==='ArrowDown'){const c=ELEMENTS.filter(e2=>{const p2=gridMap[e2[0]];return p2&&p2.row>pos.row&&p2.col===pos.col;}).sort((a,b)=>gridMap[a[0]].row-gridMap[b[0]].row);if(c.length)tgt=c[0][0];}
  else if(e.key==='ArrowUp'){const c=ELEMENTS.filter(e2=>{const p2=gridMap[e2[0]];return p2&&p2.row<pos.row&&p2.col===pos.col;}).sort((a,b)=>gridMap[b[0]].row-gridMap[a[0]].row);if(c.length)tgt=c[0][0];}
  else if(e.key==='Enter'){searchElementInViewer(el[1]);return;}
  else return;
  if(tgt){e.preventDefault();focusedEl=tgt;showElementInfo(tgt);const cell=document.querySelector(`.pt-cell[data-num="${tgt}"]`);if(cell)cell.scrollIntoView({block:'nearest',inline:'nearest'});}
});

// INIT
applyI18n();
renderPeriodicTable();
renderLegend();
updateRecentChips();
renderHistoryList();
</script>
